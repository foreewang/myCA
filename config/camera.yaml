camera:
  device_index: 0
  serial_number: null

  resolution:
    width: 5120
    height: 5120
    allow_downscale: true
    presets:
      max:
        width: 5120
        height: 5120
      half:
        width: 2560
        height: 2560

  # 默认值：如果某个物镜没有单独配置，就用这里
  exposure_us: 30000
  gain: 0.0

  # 新增：不同物镜对应不同相机参数
  objective_settings:
    4x:
      exposure_us: 1000
      gain: 0.0

    10x:
      exposure_us: 5000
      gain: 0.0

  trigger_mode: software
  pixel_format: mono8
  save_format: bmp

  save_options:
    create_dir_if_missing: true
    overwrite: true