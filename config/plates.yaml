    pulses_per_mm: 147500

    # 使用前请按实测值补全，避免沿用错误默认方向
    row_stage_sign: null
    col_stage_sign: null
    x_stage_sign_for_view_down: null
    y_stage_sign_for_view_right: null

    axis_mapping:
      image_up_down_axis: x
