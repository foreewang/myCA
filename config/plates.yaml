    # 到位误差超过该值时判定移动失败，单位：pulse。
    max_err_to_target_pulse: 3000
    # 运动保护触发时是否中止任务。
    abort_on_motion_failure: true

    # 兼容旧版 12 孔板字段，保留给旧脚本或旧接口读取。
    # 旧版 12 孔板 A1 起始点坐标，单位：pulse。
    point_12: [8563500, 5755000]
    # 旧版孔径参数，单位通常是 0.1 mm；195 表示 19.5 mm。
    point_12_d: 195
    # 旧版孔间距参数，单位通常是 0.1 mm；36 表示 3.6 mm。
    point_12_gap: 36
    # 旧版单位换算参数，表示 0.1 mm 对应多少脉冲。
    rpm_mm: 14750

    # 旧版图像方向与位移台轴映射配置。
    axis_mapping:
      # 图像上下方向对应位移台 X 轴。
      image_up_down_axis: x
      # 图像左右方向对应位移台 Y 轴。
      image_left_right_axis: y
      # 位移台运动方向与图像视野移动方向是否相反；true 表示相反。
      stage_and_view_reverse: true

