      meaning: "A1孔左侧观测起始点"

    # 单个培养孔直径，单位：mm。
    well_diameter_mm: 13.7
    # 相邻培养孔边缘之间的距离，单位：mm。
    well_gap_mm: 3.5
    # 位移台换算系数，表示 1 mm 对应多少电机脉冲。
