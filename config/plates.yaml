# C:/colony_system/config/plates.yaml
# 培养板几何配置文件。
# workflow/config_loader.py 会根据 task.plate_type 选择对应板型；
# workflow/plate_geometry.py 和 workflow/scan_planner.py 会用这些参数把孔位名转换成位移台坐标。

# 板型配置顶层字段，不能删除；配置加载器会检查该字段是否存在。
plates:
  # 6 孔板配置。
  "6-well":
    # 培养板行数；6 孔板通常为 2 行，孔位行为 A~B。
    rows: 2
    # 培养板列数；6 孔板通常为 3 列，孔位列为 1~3。
    cols: 3

    # A1 孔观测起始点，是整块板坐标推算的基准点。
    a1_start:
      # A1 孔左侧观测起始点的 X 轴绝对坐标，单位：pulse。
      x: 7750000
      # A1 孔左侧观测起始点的 Y 轴绝对坐标，单位：pulse。
      y: 6550000
      # 基准点含义说明，仅用于记录和排查。
      meaning: "A1孔左侧观测起始点"

    # 单个培养孔直径，单位：mm。
    well_diameter_mm: 31
    # 相邻培养孔边缘之间的距离，单位：mm。
    well_gap_mm:   4
    # 位移台换算系数，表示 1 mm 对应多少电机脉冲。
    pulses_per_mm: 147500

    # 换孔方向符号。
    # A1 -> B1 属于行方向变化，当前对应 X 轴减小。
    row_stage_sign: -1
    # A1 -> A2 属于列方向变化，当前对应 Y 轴减小。
    col_stage_sign: -1

    # 孔内扫描方向符号。
    # 图像视野向下移动时，位移台 X 轴的运动方向。
    x_stage_sign_for_view_down: -1
    # 图像视野向右移动时，位移台 Y 轴的运动方向。
    y_stage_sign_for_view_right: -1

    # 扫描前的位移台安全限位检查。
    stage_limits:
      # 是否启用扫描路径越界预检查。
      enabled: true
      # X 轴最小允许绝对坐标，单位：pulse。
      x_min: -800000
      # X 轴最大允许绝对坐标，单位：pulse。
      x_max: 10400000
      # Y 轴最小允许绝对坐标，单位：pulse。
      y_min: -8900000
      # Y 轴最大允许绝对坐标，单位：pulse。
      y_max: 7700000
      # 安全边界，单位：pulse；147500 约等于 1 mm。
      safety_margin: 147500

  # 运行时运动保护配置。
  # 注意：当前缩进下它是 plates 下的独立键，不属于上面的 "6-well" 板型配置。
  runtime_guard:
    # 是否启用移动后检查，检查实际运动是否符合预期。
    enabled: true
    # 计划移动量超过该值时，才认为本次移动“应该明显发生”，单位：pulse。
    stuck_min_expected_move_pulse: 20000
    # 如果实际移动量小于该值，则判定疑似卡死或撞限位，单位：pulse。
    stuck_max_actual_move_pulse: 1000
    # 到位误差超过该值时判定移动失败，单位：pulse。
    max_err_to_target_pulse: 3000
    # 运动保护触发时是否中止任务。
    abort_on_motion_failure: true

  # 12 孔板配置。
  "12-well":
    # 培养板行数；12 孔板通常为 3 行，孔位行为 A~C。
    rows: 3
    # 培养板列数；12 孔板通常为 4 列，孔位列为 1~4。
    cols: 4

