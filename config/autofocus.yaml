# C:/colony_system/config/autofocus.yaml
# Production autofocus configuration.
# This file is both the workflow policy file and the hardware/algorithm
# configuration consumed by third_party.XWJJJ260511.run_autofocus.

enabled: true

trigger:
  # Run autofocus after an objective switch before the next observation capture.
  after_objective_switch: true

  # Keep false in batch scanning. The scan executor still limits autofocus to
  # the first scan point according to scope.
  always_before_capture: false
  always_before_capture_objectives: []

  # Supported workflow scopes: once_per_well, once_per_task, disabled.
  scope: once_per_well
  run_at: before_first_capture_after_stage_move

camera:
  backend: mvs
  ip: "192.168.0.253"
  net_export_ip: "192.168.0.10"
  mvs_python_dir: C:/Program Files (x86)/MVS/Development/Samples/Python/MvImport

  # Lock exposure during autofocus so focus scores are comparable.
  exposure_auto: false
  objective_settings:
    4x:
      exposure_auto: false
      exposure_time_us: 5000
    10x:
      exposure_auto: false
      exposure_time_us: 20000

motor:
  type: modbus
  port: COM3
  baudrate: 115200
  focus_slave: 3

  # Standalone fallback. The workflow overwrites this with task.objective.
  objective: 4x

  # Software search limits for each objective, in focus-axis pulses.
  objective_ranges:
    4x:
      min_pos: -2063120
      max_pos: -1769500
    10x:
      min_pos: -2095551
      max_pos: -2028750

  profile_vel: 50000
  profile_acc: 50000
  profile_dec: 50000

focus:
  tol: 100
  max_iter: 10
  settle_ms: 300
  center_roi: 0.6
  downsample: 0.5

output:
  timestamp_folder: true
  image_path: C:/colony_system/data/autofocus/sharpest.png
  log_path: C:/colony_system/data/autofocus/focus_log.csv
