# C:/colony_system/config/autofocus.yaml
# run_task 会读取这个文件，并把它作为 config_path 传给 third_party.XWJJJ260511.run_autofocus。
# 后端不需要传 autofocus 字段。

enabled: false

trigger:
  # 物镜发生切换后自动执行 autofocus
  after_objective_switch: true

  # 是否每次采集前都强制 autofocus。正常生产先保持 false。
  always_before_capture: false

  # 指定某些物镜即使没有切换，也每次采集前 autofocus。
  # 例如 10x 景深浅，后续可以打开。
  always_before_capture_objectives: []
  # always_before_capture_objectives:
  #   - "10x"

mode:
  # false = 执行一次完整自动对焦
  # true = 只预览相机，不移动电机
  preview: false

camera:
  # 必须是 mvs，不能是 opencv。
  # opencv 会打开笔记本摄像头或普通 USB 摄像头。
  backend: mvs

  # 如果是网口海康相机，填写相机 IP 和电脑网卡 IP。
  # 如果是 USB 海康相机，可以先把 ip 和 net_export_ip 留空。
  ip: 192.168.0.253
  net_export_ip: 192.168.0.10

  # 海康 MVS Python SDK 的 MvImport 路径。
  mvs_sdk_path: C:/Program Files (x86)/MVS/Development/Samples/Python/MvImport

  # 仅 backend=opencv 时使用；backend=mvs 时不应使用它。
  opencv_index: 0

motor:
  # 真实调焦电机，使用 modbus。
  type: modbus

  port: COM3
  baudrate: 115200

  # 你已经确认：从站 3 = 调焦电机。
  focus_slave: 3

  # 当前默认物镜。run_autofocus 外部也会传 objective=4x/10x，
  # 但这里保留默认值。
  objective: 4x

  objective_ranges:
    4x:
      min_pos: -2063120
      max_pos: -1769500
    10x:
      min_pos: -2095551
      max_pos: -2028750

  # 兼容旧调用。
  min_pos: -2063120
  max_pos: -1769500

  profile_vel: 50000
  profile_acc: 50000
  profile_dec: 50000

focus:
  tol: 100
  max_iter: 10
  settle_ms: 300
  center_roi: 0.6
  downsample: 0.5

output:
  timestamp_folder: true
  image_path: output/sharpest.png
  log_path: output/focus_log.csv
