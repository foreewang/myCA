task:
  task_id: "scan_a1_001"
  task_type: "single_well_scan_capture"

  plate_type: "12-well"
  well_name: "A1"
  objective: "4x"

  scan:
    enabled: true
    overlap: 0.10
    use_objective_fov: true
    fov_override_mm: null
    settle_s: 0.8

  capture:
    save_dir: "C:/colony_system/data/images/A1_scan"
    filename_pattern: "{well}_{index:03d}_row{row:02d}_col{col:02d}_vdown_{view_down_mm:+06.3f}_vright_{view_right_mm:+06.3f}_x_{x}_y_{y}.bmp"

  motion:
    port: "COM3"
    baudrate: 115200
    x_slave: 1
    y_slave: 2
    profile_vel: 200000
    profile_acc: 50000
    profile_dec: 50000
    timeout_s: 120.0

  detect:
    enabled: false
    output_json: "C:/colony_system/data/results/A1_scan_result.json"
