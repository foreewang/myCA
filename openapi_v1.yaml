openapi: 3.0.3
info:
  title: Colony Workflow API
  version: 1.0.0-draft
  description: |
    Production-oriented API v1 draft for scheduling integration.
    This spec follows async job model and standardized response envelope.
servers:
  - url: http://localhost:8000
    description: Local development server

tags:
  - name: system
  - name: jobs
  - name: artifacts

paths:
  /api/v1/health:
    get:
      tags: [system]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeHealth"
              example:
                code: 0
                message: ok
                request_id: req_20260507_0001
                data:
                  status: ok
                  version: 1.0.0-draft

  /api/v1/capabilities:
    get:
      tags: [system]
      summary: Query API and workflow capabilities
      operationId: getCapabilities
      responses:
        "200":
          description: Capability summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeCapabilities"

  /api/v1/jobs:
    post:
      tags: [jobs]
      summary: Submit a job (asynchronous)
      description: |
        Submit workflow task and return immediately with queued status.
        Use `Idempotency-Key` header to avoid duplicate submission.
      operationId: createJob
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
          description: Optional idempotency key from scheduler side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeCreateJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [jobs]
      summary: List jobs with pagination and filters
      operationId: listJobs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/JobStatus"
        - in: query
          name: task_type
          schema:
            $ref: "#/components/schemas/TaskType"
        - in: query
          name: client_task_id
          schema:
            type: string
        - in: query
          name: created_from
          schema:
            type: string
            format: date-time
        - in: query
          name: created_to
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeJobList"

  /api/v1/jobs/{job_id}:
    get:
      tags: [jobs]
      summary: Get job detail
      operationId: getJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeJobDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/status:
    get:
      tags: [jobs]
      summary: Get lightweight job status for polling
      operationId: getJobStatus
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeJobStatus"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/result:
    get:
      tags: [jobs]
      summary: Get final job result
      operationId: getJobResult
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job result (or partial runtime result)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeJobResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/cancel:
    post:
      tags: [jobs]
      summary: Request cancellation
      operationId: cancelJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Cancellation requested or already terminal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeJobStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/jobs/{job_id}/retry:
    post:
      tags: [jobs]
      summary: Retry a failed job by creating a new job
      operationId: retryJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "202":
          description: New retry job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeCreateJob"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/jobs/{job_id}/artifacts:
    get:
      tags: [artifacts]
      summary: List artifacts for a job
      operationId: listJobArtifacts
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Artifact list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeArtifacts"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/wells/{well_name}/images:
    get:
      tags: [artifacts]
      summary: List image files for one well
      operationId: listWellImages
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/WellName"
      responses:
        "200":
          description: Image list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeWellImages"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/jobs/{job_id}/wells/{well_name}/images/{filename}:
    get:
      tags: [artifacts]
      summary: Download image file
      operationId: downloadWellImage
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/WellName"
        - in: path
          name: filename
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Binary image content
          content:
            image/bmp:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
      description: Unique job id
    WellName:
      in: path
      name: well_name
      required: true
      schema:
        type: string
      description: Well identifier such as A1/B3
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: page_size
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"

  schemas:
    JobStatus:
      type: string
      enum:
        - queued
        - running
        - cancel_requested
        - succeeded
        - failed
        - cancelled
        - timeout

    TaskType:
      type: string
      enum: [capture, pipeline, compensate]

    ObserveScope:
      type: string
      enum: [single_well, well_list, full_plate]

    Priority:
      type: string
      enum: [low, normal, high]
      default: normal

    ErrorInfo:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          example: VALIDATION_ERROR
        detail:
          type: object
          additionalProperties: true

    EnvelopeBase:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: integer
          description: 0 means success; non-zero means error
          example: 0
        message:
          type: string
          example: ok
        request_id:
          type: string
          example: req_20260507_0001

    EnvelopeError:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          required: [error]
          properties:
            error:
              $ref: "#/components/schemas/ErrorInfo"

    EnvelopeHealth:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [status, version]
              properties:
                status:
                  type: string
                  example: ok
                version:
                  type: string
                  example: 1.0.0-draft

    CapabilityData:
      type: object
      properties:
        api_version:
          type: string
          example: v1
        task_types:
          type: array
          items:
            $ref: "#/components/schemas/TaskType"
        observe_scopes:
          type: array
          items:
            $ref: "#/components/schemas/ObserveScope"
        stages:
          type: array
          items:
            type: string
            enum: [capture, detect, compensate]

    EnvelopeCapabilities:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CapabilityData"

    CreateJobRequest:
      type: object
      required: [task]
      properties:
        client_task_id:
          type: string
          description: Business id from scheduler side
        priority:
          $ref: "#/components/schemas/Priority"
        persist_result:
          type: boolean
          default: true
        config_override:
          type: object
          properties:
            camera_path:
              type: string
              nullable: true
            objectives_path:
              type: string
              nullable: true
            plates_path:
              type: string
              nullable: true
            dump_json:
              type: string
              nullable: true
        task:
          type: object
          additionalProperties: true
          description: Existing task payload compatible with current workflow engine

    JobSummary:
      type: object
      required: [job_id, status, created_at, updated_at]
      properties:
        job_id:
          type: string
        client_task_id:
          type: string
          nullable: true
        task_id:
          type: string
          nullable: true
        task_type:
          $ref: "#/components/schemas/TaskType"
        observe_scope:
          $ref: "#/components/schemas/ObserveScope"
        priority:
          $ref: "#/components/schemas/Priority"
        status:
          $ref: "#/components/schemas/JobStatus"
        progress:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true

    JobDetail:
      allOf:
        - $ref: "#/components/schemas/JobSummary"
        - type: object
          properties:
            result_json_path:
              type: string
              nullable: true
            error:
              $ref: "#/components/schemas/ErrorInfo"

    JobResultData:
      type: object
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        result:
          type: object
          additionalProperties: true
          description: Raw workflow result compatible with current run_task output

    Pagination:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    ArtifactItem:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [result_json, detect_json, compensate_json, image_dir, image_file, other]
        path:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    WellImagesData:
      type: object
      properties:
        job_id:
          type: string
        well_name:
          type: string
        image_dir:
          type: string
          nullable: true
        capture_result_json:
          type: string
          nullable: true
        detect_result_json:
          type: string
          nullable: true
        compensate_result_json:
          type: string
          nullable: true
        images:
          type: array
          items:
            type: string

    EnvelopeCreateJob:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/JobSummary"

    EnvelopeJobStatus:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                job_id:
                  type: string
                status:
                  $ref: "#/components/schemas/JobStatus"
                progress:
                  type: integer
                  minimum: 0
                  maximum: 100
                updated_at:
                  type: string
                  format: date-time

    EnvelopeJobDetail:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/JobDetail"

    EnvelopeJobResult:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/JobResultData"

    EnvelopeJobList:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/JobSummary"
                pagination:
                  $ref: "#/components/schemas/Pagination"

    EnvelopeArtifacts:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                job_id:
                  type: string
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/ArtifactItem"

    EnvelopeWellImages:
      allOf:
        - $ref: "#/components/schemas/EnvelopeBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/WellImagesData"
